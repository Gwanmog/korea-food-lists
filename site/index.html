<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🍜</text></svg>">
  <title>Eat my Seoul</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.4.1/dist/MarkerCluster.css" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.4.1/dist/MarkerCluster.Default.css" />
  <link rel="stylesheet" href="css/style.css" />
</head>

<body class="dark">
<div id="app">

  <div id="topbar">
    <div class="row spread">
      <div class="row">
        <div class="brand">🍜 <span>Eat my Seoul</span></div>
        <button id="locBtn" class="btn secondary icon-only" aria-label="My Location">📍</button>
      </div>

      <div class="row">
        <button id="filterToggle" class="btn secondary" data-i18n="filters">Filters</button>
        <button id="listToggle" class="btn secondary" data-i18n="showList">List</button>
        <button id="langBtn" class="btn secondary">KR</button>
        <button id="themeBtn" class="btn secondary icon-only">🌙</button>
      </div>
    </div>

    <div id="panel" class="closed">
      <div class="filter-group">
        <span class="filter-label" data-i18n="source">Source</span>
        <label class="pill"><input type="checkbox" id="f_michelin" checked> Michelin</label>
        <label class="pill"><input type="checkbox" id="f_blu" checked> Blue Ribbon</label>
        <label class="pill"><input type="checkbox" id="f_neon" checked> 🟡 Neon Guide</label>
      </div>

      <div class="filter-group">
        <span class="filter-label" data-i18n="award">Award</span>
        <label class="pill"><input type="checkbox" id="f_m3" checked> ⭐⭐⭐</label>
        <label class="pill"><input type="checkbox" id="f_m2" checked> ⭐⭐</label>
        <label class="pill"><input type="checkbox" id="f_m1" checked> ⭐</label>
        <label class="pill"><input type="checkbox" id="f_bib" checked> Bib</label>
        <label class="pill"><input type="checkbox" id="f_r3" checked> 🔵🔵🔵</label>
        <label class="pill"><input type="checkbox" id="f_r2" checked> 🔵🔵</label>
        <label class="pill"><input type="checkbox" id="f_r1" checked> 🔵</label>
        <label class="pill"><input type="checkbox" id="f_n_exc" checked> ✨</label>
        <label class="pill"><input type="checkbox" id="f_n_high" checked> 🌟</label>
        <label class="pill"><input type="checkbox" id="f_n_worth" checked> 👍</label>
      </div>

      <div class="row spread" style="margin-top: 4px;">
        <span id="count" class="muted">Loading...</span>
        <button id="selectAllBtn" class="btn secondary" style="font-size:11px; padding:4px 10px;" data-i18n="deselectAll">☐ None</button>
      </div>
    </div>
  </div> <div id="map-container">

    <div id="omnibox">
      <div class="omni-input-row">
        <span class="omni-icon">✨</span>
        <input type="text" id="omniInput" aria-label="Search or chat input" placeholder="Search a keyword or ask the AI..." autocomplete="off">
        <button id="omniSend" class="icon-only">➤</button>
        <button id="omniClose" class="icon-only hidden">×</button>
      </div>
      <div id="omniChat" class="omni-chat-area hidden">
        <div id="omniMessages" class="chat-messages">
          <div class="message ai">Hi! Type a quick keyword to filter the map, or ask me a full question to find the perfect spot.</div>
        </div>
      </div>
    </div>

    <div id="listWrap" class="collapsed">
      <div id="list"></div>
    </div>

    <div id="map"></div>

  </div> </div> <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
<script src="https://unpkg.com/leaflet.markercluster@1.4.1/dist/leaflet.markercluster.js"></script>
<script type="module" src="js/app.js"></script>
</body>
</html>
